{% extends 'base.html' %}

{% block content %}
<h1>Редактирование контракта</h1>
<form method="POST">
    <div class="form-group">
        <label for="number">Номер договора:</label>
        <input type="text" id="number" name="number" value="{{ contract['number'] }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="date">Дата договора:</label>
        <input type="date" id="date" name="date" value="{{ contract['date'] }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="deal_type">Тип сделки:</label>
        <select id="deal_type" name="deal_type" class="form-control" required>
            <option value="Экспресс доставка" {% if contract['deal_type'] == 'Экспресс доставка' %}selected{% endif %}>Экспресс доставка</option>
            <option value="Бесплатная доставка" {% if contract['deal_type'] == 'Бесплатная доставка' %}selected{% endif %}>Бесплатная доставка</option>
        </select>
    </div>
    <div class="form-group">
        <label for="start_price">Начальная цена:</label>
        <input type="number" id="start_price" name="start_price" value="{{ contract['start_price'] }}" class="form-control" step="0.01" required>
    </div>
    <div class="form-group">
        <label for="discount">Скидка (%):</label>
        <input type="number" id="discount" name="discount" value="{{ contract['discount'] }}" class="form-control" step="0.01" required>
    </div>
    <div class="form-group">
        <label for="finish_price">Итоговая цена:</label>
        <input type="number" id="finish_price" name="finish_price" value="{{ contract['finish_price'] }}" class="form-control" step="0.01" required>
    </div>
    <div class="form-group">
        <label for="client_id">Клиент:</label>
        <select id="client_id" name="client_id" class="form-control" required>
            {% for client in clients %}
            <option value="{{ client['id_client'] }}" {% if client['id_client'] == contract['client_id'] %}selected{% endif %}>
                {{ client['name'] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="service_id">Продукт:</label>
        <select id="service_id" name="service_id" class="form-control" required>
            {% for service in services %}
            <option value="{{ service['service_id'] }}" {% if service['service_id'] == contract['service_id'] %}selected{% endif %}>
                {{ service['name'] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="employee_id">Ответственный сотрудник:</label>
        <select id="employee_id" name="employee_id" class="form-control" required>
            {% for employee in employees %}
            <option value="{{ employee['id_employee'] }}" {% if employee['id_employee'] == contract['employee_id'] %}selected{% endif %}>
                {{ employee['name'] }}
            </option>
            {% endfor %}
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/contracts" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
