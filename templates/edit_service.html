{% extends 'base.html' %}

{% block content %}
<h1>Редактирование услуги</h1>
<form method="POST">
    <div class="form-group">
        <label for="name">Название:</label>
        <input type="text" id="name" name="name" value="{{ service['name'] }}" class="form-control" required>
    </div>
    <div class="form-group">
        <label for="description">Описание:</label>
        <textarea id="description" name="description" class="form-control" required>{{ service['description'] }}</textarea>
    </div>
    <div class="form-group">
        <label for="price">Цена:</label>
        <input type="number" id="price" name="price" value="{{ service['price'] }}" class="form-control" step="0.01" required>
    </div>
    <button type="submit" class="btn btn-primary">Сохранить</button>
    <a href="/services" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
